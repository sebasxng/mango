<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .calculator {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
            padding: 20px;
        }
        
        .display {
            background: #222;
            color: #00ff00;
            font-size: clamp(1.5em, 5vw, 2.5em);
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            margin-bottom: 20px;
            word-wrap: break-word;
            min-height: 60px;
            font-family: 'Courier New', monospace;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            padding: 18px;
            font-size: 1.3em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .number, .operator {
            background: #f0f0f0;
            color: #333;
        }
        
        .number:hover {
            background: #e0e0e0;
        }
        
        .operator {
            background: #667eea;
            color: white;
        }
        
        .operator:hover {
            background: #5568d3;
        }
        
        .equals {
            background: #48bb78;
            color: white;
            grid-column: span 2;
        }
        
        .equals:hover {
            background: #38a169;
        }
        
        .clear {
            background: #f56565;
            color: white;
            grid-column: span 2;
        }
        
        .clear:hover {
            background: #e53e3e;
        }

        /* Media Queries para responsividad */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .calculator {
                width: 95%;
                padding: 15px;
            }
            
            button {
                padding: 15px;
                font-size: 1.1em;
            }
            
            .display {
                font-size: 1.8em;
                padding: 15px;
                min-height: 50px;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .calculator {
                width: 85%;
                max-width: 450px;
            }
            
            button {
                padding: 20px;
                font-size: 1.4em;
            }
        }

        @media (min-width: 769px) {
            .calculator {
                width: 380px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clear_display()">C</button>
            <button class="operator" onclick="append_operator('/')">/</button>
            <button class="operator" onclick="append_operator('*')">×</button>
            
            <button class="number" onclick="append_number('7')">7</button>
            <button class="number" onclick="append_number('8')">8</button>
            <button class="number" onclick="append_number('9')">9</button>
            <button class="operator" onclick="append_operator('-')">−</button>
            
            <button class="number" onclick="append_number('4')">4</button>
            <button class="number" onclick="append_number('5')">5</button>
            <button class="number" onclick="append_number('6')">6</button>
            <button class="operator" onclick="append_operator('+')">+</button>
            
            <button class="number" onclick="append_number('1')">1</button>
            <button class="number" onclick="append_number('2')">2</button>
            <button class="number" onclick="append_number('3')">3</button>
            <button class="operator" onclick="append_operator('.')">,</button>
            
            <button class="number" onclick="append_number('0')" style="grid-column: span 2;">0</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let current_expression = '';

        function append_number(num) {
            current_expression += num;
            update_display();
        }

        function append_operator(op) {
            if (current_expression && !current_expression.endsWith(op)) {
                current_expression += op;
                update_display();
            }
        }

        function clear_display() {
            current_expression = '';
            update_display();
        }

        function update_display() {
            display.textContent = current_expression || '0';
        }

        function calculate() {
            if (!current_expression) return;
            
            fetch('/calculate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({expression: current_expression})
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    display.textContent = 'Error';
                } else {
                    current_expression = String(data.result);
                    update_display();
                }
            })
            .catch(error => {
                display.textContent = 'Error';
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
